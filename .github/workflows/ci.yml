name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Python compile checks
        run: |
          python -m py_compile app.py
          python -m py_compile mkc_csv_columns.py
          python -m py_compile reporting/domain.py
          python -m py_compile reporting/regex_contract.py
          python -m py_compile reporting/routes.py
          python -m py_compile routes/v2_routes.py
          python -m py_compile routes/normalized_routes.py
          python -m py_compile routes/legacy_catalog_routes.py
          python -m py_compile routes/ai_routes.py
          python -m py_compile routes/static_pages_routes.py
          python -m py_compile routes/admin_routes.py
          python -m py_compile sqlite_schema.py
          python -m py_compile tools/reporting_eval_harness.py
          python -m pytest -q

  reporting-smoke-local:
    runs-on: self-hosted
    # Local-only by design: this runs on your self-hosted runner, not GitHub-hosted runners.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Reporting smoke gate (local endpoint)
        env:
          REPORTING_EVAL_BASE_URL: ${{ secrets.REPORTING_EVAL_BASE_URL }}
        run: |
          if [ -n "$REPORTING_EVAL_BASE_URL" ]; then
            echo "Running reporting smoke suite against $REPORTING_EVAL_BASE_URL"
            python tools/reporting_eval_harness.py "$REPORTING_EVAL_BASE_URL" --suite smoke
          else
            echo "REPORTING_EVAL_BASE_URL secret not set; skipping local smoke harness run."
          fi
