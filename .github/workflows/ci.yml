name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Python compile checks
        run: |
          python -m py_compile app.py
          python -m py_compile auth.py
          python -m py_compile blade_ai.py
          python -m py_compile normalized_model.py
          python -m py_compile reporting/domain.py
          python -m py_compile reporting/compiler.py
          python -m py_compile reporting/planner.py
          python -m py_compile reporting/plan_models.py
          python -m py_compile reporting/plan_validator.py
          python -m py_compile reporting/retrieval.py
          python -m py_compile reporting/routes.py
          python -m py_compile routes/v2_routes.py
          python -m py_compile routes/static_pages_routes.py
          python -m py_compile routes/admin_routes.py
          python -m py_compile migrations/migrate_v2.py

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/ -m "not live_llm" -q --tb=short
