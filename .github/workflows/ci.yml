name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Python compile checks
        run: |
          python -m py_compile app.py
          python -m py_compile tools/reporting_eval_harness.py

      - name: Reporting smoke gate (optional external endpoint)
        env:
          REPORTING_EVAL_BASE_URL: ${{ secrets.REPORTING_EVAL_BASE_URL }}
        run: |
          if [ -n "$REPORTING_EVAL_BASE_URL" ]; then
            echo "Running reporting smoke suite against $REPORTING_EVAL_BASE_URL"
            python tools/reporting_eval_harness.py "$REPORTING_EVAL_BASE_URL" --suite smoke
          else
            echo "REPORTING_EVAL_BASE_URL secret not set; skipping external smoke harness run."
          fi
